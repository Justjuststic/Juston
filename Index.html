<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --main:red; }

body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(-45deg,#1a0000,#000,#300000,#000);
  background-size:400% 400%;
  animation:bg 10s infinite;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

canvas{
  position:fixed;
  z-index:-1;
  pointer-events:none;
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
  box-shadow:0 0 10px var(--main);
}

.sidebar{
  position:fixed;
  left:-100%;
  width:70%;
  height:100%;
  background:#050505;
  transition:0.3s;
  padding:20px;
}
.sidebar.active{left:0;}

.sidebar a{
  display:block;
  margin:15px 0;
  cursor:pointer;
}

.card{
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

button{
  padding:10px;
  border:none;
  background:var(--main);
  color:white;
  margin:5px;
  cursor:pointer;
}

input,textarea,select{
  padding:10px;
  margin:5px;
  width:90%;
}

.page{padding:20px;}
.avatar{width:40px;border-radius:6px;}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- NAV -->
<div class="navbar">
  <div onclick="toggleMenu()">☰</div>
  <div>JUSTON</div>
  <div id="coins">0💰</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('server')">Server</a>
  <a onclick="showPage('shop')">Shop</a>
  <a onclick="showPage('team')">Team</a>
  <a onclick="showPage('blog')">Blog</a>
  <a onclick="showPage('chat')">Chat</a>
  <a onclick="showPage('profile')">Profil</a>
  <a onclick="showPage('settings')">Settings</a>
  <a id="adminBtn" style="display:none;" onclick="showPage('admin')">Admin</a>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h1>JUSTON</h1>
</div>

<!-- SERVER -->
<div id="server" class="page" style="display:none;">
  <div class="card">Status: 🟢 Online</div>
</div>

<!-- SHOP -->
<div id="shop" class="page" style="display:none;">
  <div class="card">VIP <button onclick="buy('vip',100)">100💰</button></div>
  <div class="card">MOD <button onclick="buy('mod',300)">300💰</button></div>
</div>

<!-- TEAM -->
<div id="team" class="page" style="display:none;">
  <div id="teamList"></div>

  <div id="teamAdd" style="display:none;" class="card">
    <input id="tName" placeholder="Name">
    <input id="tSkin" placeholder="Minecraft Name">
    <button onclick="addTeam()">Add</button>
  </div>
</div>

<!-- BLOG -->
<div id="blog" class="page" style="display:none;">
  <div id="blogList"></div>

  <div id="blogCreate" style="display:none;" class="card">
    <input id="title" placeholder="Titel">
    <textarea id="content"></textarea>
    <button onclick="createPost()">Post</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="page" style="display:none;">
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- PROFILE -->
<div id="profile" class="page" style="display:none;">
  <div class="card">
    <input id="nameInput" placeholder="Name">
    <input id="passInput" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page" style="display:none;">
  <button onclick="setTheme('red')">Rot</button>
  <button onclick="setTheme('blue')">Blau</button>
  <button onclick="setTheme('green')">Grün</button>
  <button onclick="setTheme('purple')">Lila</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page" style="display:none;">
  <div id="userList"></div>
</div>

<script>
window.onload=function(){

let users=JSON.parse(localStorage.getItem("users"))||[
  {email:"Juston@Juston.com",password:"1234",coins:500,role:"admin"}
];

let currentUser=JSON.parse(localStorage.getItem("currentUser"));
let blog=JSON.parse(localStorage.getItem("blog"))||[];
let team=JSON.parse(localStorage.getItem("team"))||[];
let chat=JSON.parse(localStorage.getItem("chat"))||[];

// NAV
window.toggleMenu=()=>sidebar.classList.toggle("active");

window.showPage=p=>{
  ["home","server","shop","team","blog","chat","profile","settings","admin"]
  .forEach(x=>document.getElementById(x).style.display="none");

  document.getElementById(p).style.display="block";
};

// LOGIN
window.login=()=>{
  let name=nameInput.value.trim();
  let pass=passInput.value.trim();

  let user=users.find(u=>u.email===name+"@Juston.com" && u.password===pass);
  if(!user) return alert("Falsch!");

  currentUser=user;
  save(); updateUI();
};

// REGISTER
window.register=()=>{
  let name=nameInput.value.trim();
  let pass=passInput.value.trim();

  if(!name||!pass) return alert("Füll alles aus!");

  let email=name+"@Juston.com";

  if(users.find(u=>u.email===email)) return alert("Existiert!");

  users.push({email,password:pass,coins:200,role:"user"});
  save();
  alert("Registriert!");
};

// UI
function updateUI(){
  coins.innerText=currentUser.coins+"💰";

  if(currentUser.role==="admin"){
    adminBtn.style.display="block";
    teamAdd.style.display="block";
  }

  if(currentUser.role==="admin"||currentUser.role==="mod"){
    blogCreate.style.display="block";
  }
}

// SHOP
window.buy=(role,price)=>{
  if(!currentUser) return alert("Login!");
  if(currentUser.coins<price) return alert("Zu wenig Coins!");

  currentUser.coins-=price;
  currentUser.role=role;

  save(); updateUI();
};

// TEAM
window.addTeam=()=>{
  team.push({
    name:tName.value.trim(),
    skin:tSkin.value.trim() || "Steve"
  });
  save(); renderTeam();
};

function renderTeam(){
  teamList.innerHTML="";
  team.forEach((m,i)=>{
    teamList.innerHTML+=`
    <div class="card" style="display:flex;align-items:center;gap:10px;">
      <img class="avatar"
        src="https://mc-heads.net/head/${m.skin}"
        onerror="this.src='https://mc-heads.net/head/Steve'">
      <b>${m.name}</b>
      <button onclick="delTeam(${i})">❌</button>
    </div>`;
  });
}

window.delTeam=i=>{
  team.splice(i,1);
  save(); renderTeam();
};

// BLOG
window.createPost=()=>{
  blog.push({title:title.value,content:content.value});
  save(); renderBlog();
};

function renderBlog(){
  blogList.innerHTML="";
  blog.forEach((p,i)=>{
    blogList.innerHTML+=`
    <div class="card">
      <h3>${p.title}</h3>
      <p>${p.content}</p>
      <button onclick="delPost(${i})">❌</button>
    </div>`;
  });
}

window.delPost=i=>{
  blog.splice(i,1);
  save(); renderBlog();
};

// CHAT
window.sendMsg=()=>{
  if(!currentUser) return alert("Login!");
  chat.push(currentUser.email+": "+chatInput.value);
  save(); renderChat();
};

function renderChat(){
  chatBox.innerHTML=chat.map(m=>"<div>"+m+"</div>").join("");
}

// ADMIN
function renderUsers(){
  userList.innerHTML="";
  users.forEach((u,i)=>{
    userList.innerHTML+=`
    <div class="card">
      ${u.email} (${u.role}) 💰${u.coins}
      <select onchange="setRole(${i},this.value)">
        <option ${u.role==="user"?"selected":""}>user</option>
        <option ${u.role==="mod"?"selected":""}>mod</option>
        <option ${u.role==="admin"?"selected":""}>admin</option>
      </select>
      <button onclick="addCoins(${i})">+💰</button>
    </div>`;
  });
}

window.setRole=(i,r)=>{
  users[i].role=r;
  save(); renderUsers();
};

window.addCoins=i=>{
  let amount=parseInt(prompt("Coins hinzufügen:"));
  if(isNaN(amount)) return;
  users[i].coins+=amount;
  save(); renderUsers();
};

// THEME
window.setTheme=c=>{
  document.documentElement.style.setProperty("--main",c);
};

// SAVE
function save(){
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("blog",JSON.stringify(blog));
  localStorage.setItem("team",JSON.stringify(team));
  localStorage.setItem("chat",JSON.stringify(chat));
  localStorage.setItem("currentUser",JSON.stringify(currentUser));
}

// INIT
renderTeam();
renderBlog();
renderUsers();
renderChat();
if(currentUser) updateUI();

};
</script>

</body>
</html>
