<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUSTON Panel</title>

<style>
:root { --main:red; }

/* BODY & BACKGROUND */
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#1a0000,#000,#300000,#000);
  background-size:400% 400%;
  animation:bg 15s infinite;
  transition:background 0.5s;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  box-shadow:0 0 15px var(--main);
  position:fixed; width:100%; z-index:10;
}

/* BUTTONS */
button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:var(--main);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 8px var(--main);
}
button:hover{transform:scale(1.05); box-shadow:0 0 25px var(--main);}

/* CARDS */
.card{
  background:rgba(20,20,20,0.8);
  border-radius:12px;
  padding:15px;
  margin:10px 0;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}
.card:hover{transform:scale(1.03); box-shadow:0 0 25px var(--main);}

/* RANK TAGS */
.rankTag{
  padding:4px 10px;
  border-radius:8px;
  font-weight:bold;
  font-size:12px;
  color:white;
  text-shadow:0 0 5px #000;
  display:inline-block;
  margin-bottom:4px;
  animation:glowPulse 2s infinite alternate;
}
@keyframes glowPulse{
  0%{box-shadow:0 0 5px #000 inset;}
  50%{box-shadow:0 0 15px #fff inset;}
  100%{box-shadow:0 0 5px #000 inset;}
}

/* TEAM */
.groupCard{margin-bottom:20px; transition:0.5s;}
.member{
  display:flex; align-items:center; gap:10px;
  background:rgba(0,0,0,0.6);
  padding:8px;
  border-radius:8px;
  margin:5px 0;
  transition:0.3s;
}
.member:hover{transform:scale(1.02); box-shadow:0 0 15px var(--main);}
.member img{width:40px;height:40px;border-radius:6px;}

/* CHAT */
#chatBox{max-height:400px;overflow-y:auto;padding:10px;border-radius:10px;}
#chatBox div{margin:5px 0;padding:6px 10px;border-radius:10px;max-width:70%;animation:fadeIn 0.3s;}
#chatBox div.self{background:var(--main);color:#000;margin-left:auto;}
#chatBox div.other{background:#333;}

/* PAGE & ANIMATION */
.page{padding:80px 20px 20px;animation:fadeIn 0.4s;}
@keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

/* INPUT */
input, textarea{padding:10px; margin:5px 0; width:90%; border-radius:6px; border:1px solid #555; background:rgba(0,0,0,0.5); color:white; transition:0.3s;}
input:focus,textarea:focus{outline:none; border:1px solid var(--main); box-shadow:0 0 8px var(--main); background:rgba(255,255,255,0.05);}

/* SIDEBAR */
.sidebar{
  position:fixed; left:-100%; width:70%; height:100%;
  background:rgba(5,5,5,0.95); transition:0.3s; padding:20px;
  backdrop-filter:blur(10px); border-right:1px solid rgba(255,255,255,0.1);
}
.sidebar.active{left:0; transition:0.5s;}
.sidebar a{display:block; margin:15px 0; cursor:pointer; transition:0.2s;}
.sidebar a:hover{color:var(--main);}
</style>
</head>
<body>

<div class="navbar">
  <div onclick="toggleMenu()">☰</div>
  <div>JUSTON</div>
  <div id="coins">0💰</div>
</div>

<div id="sidebar" class="sidebar">
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('server')">Server</a>
  <a onclick="showPage('shop')">Shop</a>
  <a onclick="showPage('team')">Team</a>
  <a onclick="showPage('blog')">Blog</a>
  <a onclick="showPage('chat')">Chat</a>
  <a onclick="showPage('profile')">Profil</a>
  <a onclick="showPage('settings')">Settings</a>
  <a id="adminBtn" style="display:none;" onclick="showPage('admin')">Admin</a>
</div>

<!-- PAGES -->
<div id="home" class="page"><h1>JUSTON</h1></div>
<div id="server" class="page" style="display:none;"><div class="card">Status: 🟢 Online</div></div>
<div id="shop" class="page" style="display:none;"><div id="shopList"></div></div>
<div id="team" class="page" style="display:none;"><div id="teamList"></div><button onclick="addGroup()">+ Gruppe</button></div>
<div id="blog" class="page" style="display:none;"><div id="blogList"></div></div>
<div id="chat" class="page" style="display:none;"><div id="chatBox"></div><input id="chatInput"><button onclick="sendMsg()">Senden</button></div>
<div id="profile" class="page" style="display:none;">
  <div class="card">
    <input id="nameInput" placeholder="Name">
    <input id="passInput" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>
<div id="settings" class="page" style="display:none;">
  <button onclick="setTheme('red')">Rot</button>
  <button onclick="setTheme('blue')">Blau</button>
  <button onclick="setTheme('green')">Grün</button>
  <button onclick="setTheme('purple')">Lila</button>
</div>
<div id="admin" class="page" style="display:none;"><div id="userList"></div></div>

<script>
// Sidebar & Pages
window.toggleMenu = () => sidebar.classList.toggle("active");
window.showPage = pageId => {
  const pages = ["home","server","shop","team","blog","chat","profile","settings","admin"];
  pages.forEach(p => document.getElementById(p).style.display = "none");
  document.getElementById(pageId).style.display = "block";
}

// User System
let users = JSON.parse(localStorage.getItem("users")) || [{email:"Juston@Juston.com", password:"1234", coins:500, role:"admin"}];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let team = JSON.parse(localStorage.getItem("team")) || [];
let chat = JSON.parse(localStorage.getItem("chat")) || [];

const RANKS_BUYABLE = ["Premium","Superpremium","VIP","VIP+","VIP++","Juston"];
const RANK_COLORS = {"Premium":"#40E0D0","Superpremium":"#40E0D0","VIP":"#4B0082","VIP+":"#4B0082","VIP++":"#4B0082","Juston":"#4B0082","YouTube":"#ff6666","Builder":"#C0C0C0","Helper":"#00008B","JuniorSup":"#FFD700","Sup":"#FFD700","Mod":"#00cc00","Dev":"#FFD700","Manager":"#0066ff","Admin":"#ff6666","Head-Admin":"#ff6666","Owner":"#8B0000"};

function clean(s){return s.replace(/[<>{}]/g,"");}
function save(){localStorage.setItem("users",JSON.stringify(users));localStorage.setItem("team",JSON.stringify(team));localStorage.setItem("chat",JSON.stringify(chat));localStorage.setItem("currentUser",JSON.stringify(currentUser));}
function getUser(){return users.find(u => u.email===currentUser?.email);}
function getRankTag(rank){const color = RANK_COLORS[rank] || "#555"; return `<span class="rankTag" style="background:${color}; box-shadow:0 0 8px ${color},0 0 15px ${color} inset;">${rank}</span>`;}

// Login/Register
window.login = () => {
  const n = clean(nameInput.value.trim()), p = clean(passInput.value.trim());
  let u = users.find(u => u.email===n+"@Juston.com" && u.password===p);
  if(!u) return alert("Falsch!");
  currentUser = u; save(); updateUI();
}
window.register = () => {
  const n = clean(nameInput.value.trim()), p = clean(passInput.value.trim());
  if(!n||!p) return alert("Füll alles aus!");
  const e = n+"@Juston.com";
  if(users.find(u=>u.email===e)) return alert("Existiert!");
  users.push({email:e,password:p,coins:200,role:"user"}); save(); alert("Registriert!");
}
window.logout = () => {currentUser=null; save(); updateUI();}

// Update UI
function updateUI(){
  coins.innerText="0💰"; adminBtn.style.display="none";
  let u = getUser(); if(!u) return;
  coins.innerText = u.coins+"💰"; if(u.role==="admin") adminBtn.style.display="block";
  renderShop(); renderTeam(); renderChat();
}

// Shop
function renderShop(){
  shopList.innerHTML=""; RANKS_BUYABLE.forEach((r,i)=>{
    let p=(i+1)*100;
    shopList.innerHTML+=`<div class="card"><h3>${getRankTag(r)}</h3><button onclick="buyRank('${r}',${p})">Kaufen (${p}💰)</button></div>`;
  });
}
window.buyRank = (rank, price) => {
  let u=getUser(); if(!u) return alert("Login!");
  if(u.coins < price) return alert("Zu wenig Coins!");
  u.coins -= price; u.role = rank; save(); updateUI();
}

// Team
window.addGroup = () => { let n=prompt("Gruppenname:"); if(!n) return; team.push({group:n,members:[]}); save(); renderTeam(); }
window.addMember = gi => { let n=prompt("Spieler Name:"); if(!n) return; let s=prompt("Minecraft Name:")||"Steve"; let r=prompt("Rank:")||"Member"; team[gi].members.push({name:n,skin:s,rank:r}); save(); renderTeam(); }
window.delMember = (gi,mi) => { team[gi].members.splice(mi,1); save(); renderTeam(); }
function renderTeam(){ teamList.innerHTML=""; team.forEach((g,gi)=>{ let membersHTML=g.members.map((m,mi)=>`<div class="member"><img src="https://mc-heads.net/head/${m.skin}" onerror="this.src='https://mc-heads.net/head/Steve'"><div><b>${m.name}</b><br>${getRankTag(m.rank)}</div><button onclick="delMember(${gi},${mi})">❌</button></div>`).join(""); teamList.innerHTML+=`<div class="card groupCard"><h2>${g.group}</h2>${membersHTML}<button onclick="addMember(${gi})">+ Spieler</button></div>`; }); }

// Chat
window.sendMsg = () => { let u=getUser(); if(!u) return alert("Login!"); let m=clean(chatInput.value.trim()); if(!m) return; chat.push(u.email+": "+m); if(chat.length>50) chat.shift(); chatInput.value=""; save(); renderChat(); }
function renderChat(){ chatBox.innerHTML=chat.map(m=>{ let cls=m.startsWith(currentUser?.email)?'self':'other'; return `<div class="${cls}">${m}</div>` }).join(""); }

updateUI();
</script>
</body>
</html>
